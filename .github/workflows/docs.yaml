name: Docs

on:
  push:
    branches: [main]
    paths: ["docs/**", "mkdocs.yml", "src/**"]
  pull_request:
    paths: ["docs/**", "mkdocs.yml", "src/**"]
  workflow_dispatch:
  workflow_call:
    inputs:
      deploy:
        type: boolean
        default: false
      version:
        type: string
        default: ""

permissions:
  contents: write

jobs:
  docs:
    name: Build & deploy docs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: uv sync --group dev

      - name: Build docs
        if: ${{ !inputs.deploy }}
        run: uv run mkdocs build --strict

      - name: Configure git
        if: inputs.deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Deploy dev docs on push to main (non-release)
      - name: Deploy dev docs
        if: github.event_name == 'push' && !inputs.deploy
        run: uv run mike deploy dev --push

      # Deploy versioned docs on release
      - name: Deploy release docs
        if: inputs.deploy && inputs.version
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          if [[ "$VERSION" == *-* ]]; then
            uv run mike deploy "$VERSION" --push
          else
            uv run mike deploy "$VERSION" latest --update-aliases --set-default --push
          fi
